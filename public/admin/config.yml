backend:
  name: github
  repo: redem-zk/lingerie-oem-blog
  branch: master
  base_url: https://kayson.cc.cd
  auth_type: pkce
  client_id: Ov23libt3fxKTYcSq2cJ

media_folder: "public/images"
public_folder: "/images"

i18n:
  structure: multiple_folders
  locales: [en, zh]
  default_locale: en

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: true
    identifier_field: title
    format: frontmatter
    editor:
      preview: false
    i18n: true
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Description
        name: description
        widget: string
        required: false
        i18n: true
      - label: Body
        name: body
        widget: markdown
        required: false
        i18n: true

  - name: products
    label: Products
    label_singular: Product
    folder: src/content/products
    create: true
    identifier_field: title
    format: frontmatter
    editor:
      preview: false
    i18n: true
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Category
        name: category
        widget: select
        i18n: true
        options:
          - { label: "Lace Bra", value: "lace-bra" }
          - { label: "Everyday Bra", value: "everyday-bra" }
          - { label: "Sports Bra", value: "sports-bra" }
          - { label: "Shapewear", value: "shapewear" }
          - { label: "Panty", value: "panty" }
          - { label: "Sleepwear", value: "sleepwear" }
          - { label: "Other", value: "other" }
      - label: Images
        name: images
        widget: list
        i18n: true
        field:
          label: Image
          name: image
          widget: image
      - label: Fabric
        name: fabric
        widget: string
        i18n: true
      - label: MOQ
        name: moq
        widget: string
        i18n: true
      - label: Sample Lead Time
        name: sampleLeadTime
        widget: string
        i18n: true
      - label: Features
        name: features
        widget: list
        i18n: true
        field:
          label: Feature
          name: feature
          widget: string
      - label: Featured
        name: featured
        widget: boolean
        default: false
        i18n: duplicate
      - label: Order
        name: order
        widget: number
        default: 0
        i18n: duplicate

  - name: cases
    label: "Client Cases"
    label_singular: "Client Case"
    folder: src/content/cases
    create: true
    identifier_field: title
    format: frontmatter
    editor:
      preview: false
    i18n: true
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Client Name
        name: clientName
        widget: string
        i18n: true
      - label: Client Region
        name: clientRegion
        widget: string
        i18n: true
      - label: Category
        name: category
        widget: string
        i18n: true
      - label: Challenge
        name: challenge
        widget: text
        i18n: true
      - label: Solution
        name: solution
        widget: text
        i18n: true
      - label: Result
        name: result
        widget: text
        i18n: true
      - label: Images
        name: images
        widget: list
        required: false
        i18n: true
        field:
          label: Image
          name: image
          widget: image
      - label: Featured
        name: featured
        widget: boolean
        default: false
        i18n: duplicate
      - label: Order
        name: order
        widget: number
        default: 0
        i18n: duplicate

  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    identifier_field: title
    format: frontmatter
    editor:
      preview: false
    i18n: true
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
      - label: Date
        name: date
        widget: datetime
        i18n: duplicate
      - label: Excerpt
        name: excerpt
        widget: text
        i18n: true
      - label: Cover Image
        name: coverImage
        widget: image
        i18n: true
      - label: Tags
        name: tags
        widget: list
        i18n: true
        field:
          label: Tag
          name: tag
          widget: string
      - label: Author
        name: author
        widget: string
        default: "Lingerie OEM Studio"
        i18n: duplicate
      - label: Featured
        name: featured
        widget: boolean
        default: false
        i18n: duplicate
      - label: Body
        name: body
        widget: markdown
        i18n: true
